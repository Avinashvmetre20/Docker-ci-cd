<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git & Docker Command Reference with examples</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --git: #f05033;
    --git-glow: rgba(240,80,51,0.18);
    --docker: #2496ed;
    --docker-glow: rgba(36,150,237,0.18);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #f0e030;
    --cmd-fixed-git: #ffa991;
    --cmd-var-git: #ffe066;
    --cmd-fixed-docker: #7dc8ff;
    --cmd-var-docker: #a8ffb0;
    --example-color: #b39dff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  header {
    text-align: center;
    padding: 60px 0 40px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--muted), transparent);
  }

  .header-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(240,224,48,0.3);
    padding: 5px 16px;
    border-radius: 2px;
    margin-bottom: 22px;
    animation: fadeIn 0.6s ease;
  }

  h1 {
    font-size: clamp(2.4rem, 5vw, 4.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    animation: slideUp 0.7s ease both;
  }

  .title-git { color: var(--git); }
  .title-amp { color: var(--muted); margin: 0 16px; }
  .title-docker { color: var(--docker); }

  .subtitle {
    margin-top: 14px;
    color: var(--muted);
    font-size: 0.95rem;
    animation: slideUp 0.8s 0.1s ease both;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 28px 0 0;
    animation: fadeIn 0.8s 0.2s ease both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 32px 0 0;
    flex-wrap: wrap;
    animation: fadeIn 0.8s 0.25s ease both;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.7rem;
    font-weight: 800;
    display: block;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-git .stat-num { color: var(--git); }
  .stat-docker .stat-num { color: var(--docker); }
  .stat-total .stat-num { color: var(--accent); }

  .tab-nav {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 40px 0 32px;
    animation: fadeIn 0.8s 0.3s ease both;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 28px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.25s;
    text-transform: uppercase;
  }
  .tab-btn:hover { border-color: var(--muted); color: var(--text); }
  .tab-btn.active-git { border-color: var(--git); color: var(--git); background: var(--git-glow); }
  .tab-btn.active-docker { border-color: var(--docker); color: var(--docker); background: var(--docker-glow); }
  .tab-icon { font-size: 18px; }

  .search-wrap {
    position: relative;
    max-width: 480px;
    margin: 0 auto 32px;
    animation: fadeIn 0.8s 0.35s ease both;
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 18px 12px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--muted); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
  }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    gap: 20px;
  }

  .category-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .category-card:hover { transform: translateY(-2px); }
  .git-section .category-card:hover { border-color: rgba(240,80,51,0.4); }
  .docker-section .category-card:hover { border-color: rgba(36,150,237,0.4); }

  .card-header {
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .git-section .card-header { background: linear-gradient(90deg, var(--git-glow), transparent); }
  .docker-section .card-header { background: linear-gradient(90deg, var(--docker-glow), transparent); }

  .card-icon { font-size: 17px; }
  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .git-section .card-title { color: var(--git); }
  .docker-section .card-title { color: var(--docker); }

  .command-list { padding: 8px 0; }

  .command-item {
    padding: 10px 18px 11px;
    border-bottom: 1px solid rgba(255,255,255,0.035);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .command-item:last-child { border-bottom: none; }
  .command-item:hover { background: var(--surface2); }

  /* Template line */
  .cmd-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    font-weight: 600;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0;
    row-gap: 2px;
    line-height: 1.5;
  }

  /* Fixed keyword parts */
  .git-section .cmd-fixed { color: var(--cmd-fixed-git); }
  .docker-section .cmd-fixed { color: var(--cmd-fixed-docker); }

  /* Variable (user-defined) parts */
  .cmd-var {
    color: var(--cmd-var-git);
    background: rgba(255,224,102,0.08);
    border-radius: 3px;
    padding: 0 3px;
  }
  .docker-section .cmd-var {
    color: var(--cmd-var-docker);
    background: rgba(168,255,176,0.08);
  }

  /* Example row */
  .cmd-example {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    flex-wrap: wrap;
    row-gap: 1px;
    padding-left: 1px;
  }

  .eg-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #333c55;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    padding: 1px 5px;
    border-radius: 2px;
  }

  .ex-fixed { color: #4a5370; }
  .ex-var { color: var(--example-color); font-weight: 700; }

  /* Description */
  .cmd-desc {
    font-size: 11px;
    color: #404760;
    font-family: 'JetBrains Mono', monospace;
    padding-left: 1px;
  }

  .tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    vertical-align: middle;
    margin-left: 5px;
    flex-shrink: 0;
  }
  .tag-danger { background: rgba(239,68,68,0.18); color: #f87171; }
  .tag-pro    { background: rgba(168,85,247,0.18); color: #c084fc; }
  .tag-new    { background: rgba(34,197,94,0.18); color: #4ade80; }

  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: #181e30;
    border: 1px solid #2a3050;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }

  @media (max-width: 700px) {
    .category-grid { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
    .legend { gap: 12px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-badge">// Command Reference v3.0 — With Examples</div>
    <h1>
      <span class="title-git">Git</span>
      <span class="title-amp">&</span>
      <span class="title-docker">Docker</span>
    </h1>
    <p class="subtitle">Two-tone syntax · Real-world examples · Click any command to copy</p>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ffa991"></div> Git fixed keyword</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffe066"></div> Your value (Git)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7dc8ff"></div> Docker fixed keyword</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a8ffb0"></div> Your value (Docker)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b39dff"></div> Example value</div>
    </div>

    <div class="stats-bar">
      <div class="stat stat-git"><span class="stat-num">50+</span><span class="stat-label">Git Commands</span></div>
      <div class="stat stat-total"><span class="stat-num">100+</span><span class="stat-label">Total</span></div>
      <div class="stat stat-docker"><span class="stat-num">55+</span><span class="stat-label">Docker Commands</span></div>
    </div>
  </header>

  <div class="search-wrap" style="margin-top:40px">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search commands..." oninput="filterCommands(this.value)">
  </div>

  <div class="tab-nav">
    <button class="tab-btn active-git" onclick="showTab('git', this)">
      <span class="tab-icon">⎇</span> Git Commands
    </button>
    <button class="tab-btn" onclick="showTab('docker', this)">
      <span class="tab-icon">🐳</span> Docker Commands
    </button>
  </div>

  <div id="git-section" class="section git-section active">
    <div class="category-grid" id="git-grid"></div>
  </div>

  <div id="docker-section" class="section docker-section">
    <div class="category-grid" id="docker-grid"></div>
  </div>

</div>

<div class="toast" id="toast">📋 Copied!</div>

<script>
// parts: [{t:'fixed'|'var', v:'string'}]
// example: same structure but with real values
const gitData = [
  { icon:"🚀", title:"Setup & Config", commands:[
    { parts:[{t:'fixed',v:'git config --global user.name '},{t:'var',v:'"YourName"'}], example:[{t:'fixed',v:'git config --global user.name '},{t:'var',v:'"John Doe"'}], desc:"Set your global Git username" },
    { parts:[{t:'fixed',v:'git config --global user.email '},{t:'var',v:'"email@example.com"'}], example:[{t:'fixed',v:'git config --global user.email '},{t:'var',v:'"john@company.com"'}], desc:"Set your global Git email" },
    { parts:[{t:'fixed',v:'git config --global core.editor '},{t:'var',v:'"editor"'}], example:[{t:'fixed',v:'git config --global core.editor '},{t:'var',v:'"code"'}], desc:"Set default code editor" },
    { parts:[{t:'fixed',v:'git config --list'}], example:[{t:'fixed',v:'git config --list'}], desc:"List all config settings" },
    { parts:[{t:'fixed',v:'git config --global alias.'},{t:'var',v:'shortname'},{t:'fixed',v:' '},{t:'var',v:'command'}], example:[{t:'fixed',v:'git config --global alias.'},{t:'var',v:'st'},{t:'fixed',v:' '},{t:'var',v:'status'}], desc:"Create a command alias" },
  ]},
  { icon:"📁", title:"Initialize & Clone", commands:[
    { parts:[{t:'fixed',v:'git init'}], example:[{t:'fixed',v:'git init'}], desc:"Initialize a new local repo" },
    { parts:[{t:'fixed',v:'git init '},{t:'var',v:'<folder>'}], example:[{t:'fixed',v:'git init '},{t:'var',v:'my-project'}], desc:"Init repo in a specific folder" },
    { parts:[{t:'fixed',v:'git clone '},{t:'var',v:'<url>'}], example:[{t:'fixed',v:'git clone '},{t:'var',v:'https://github.com/org/repo.git'}], desc:"Clone a remote repository" },
    { parts:[{t:'fixed',v:'git clone '},{t:'var',v:'<url>'},{t:'fixed',v:' '},{t:'var',v:'<folder>'}], example:[{t:'fixed',v:'git clone '},{t:'var',v:'https://github.com/org/repo.git'},{t:'fixed',v:' '},{t:'var',v:'my-app'}], desc:"Clone into a named folder" },
    { parts:[{t:'fixed',v:'git clone --depth 1 '},{t:'var',v:'<url>'}], example:[{t:'fixed',v:'git clone --depth 1 '},{t:'var',v:'https://github.com/org/repo.git'}], desc:"Shallow clone — latest commit only" },
    { parts:[{t:'fixed',v:'git clone --branch '},{t:'var',v:'<branch>'},{t:'fixed',v:' '},{t:'var',v:'<url>'}], example:[{t:'fixed',v:'git clone --branch '},{t:'var',v:'develop'},{t:'fixed',v:' '},{t:'var',v:'https://github.com/org/repo.git'}], desc:"Clone a specific branch" },
  ]},
  { icon:"📸", title:"Staging & Commits", commands:[
    { parts:[{t:'fixed',v:'git status'}], example:[{t:'fixed',v:'git status'}], desc:"Show working tree status" },
    { parts:[{t:'fixed',v:'git add '},{t:'var',v:'<file>'}], example:[{t:'fixed',v:'git add '},{t:'var',v:'src/LoginPage.jsx'}], desc:"Stage a specific file" },
    { parts:[{t:'fixed',v:'git add .'}], example:[{t:'fixed',v:'git add .'}], desc:"Stage all changes in current folder" },
    { parts:[{t:'fixed',v:'git add -p'}], example:[{t:'fixed',v:'git add -p'}], desc:"Interactively stage chunks of changes" },
    { parts:[{t:'fixed',v:'git commit -m '},{t:'var',v:'"message"'}], example:[{t:'fixed',v:'git commit -m '},{t:'var',v:'"feat: add login page UI"'}], desc:"Commit staged changes with a message" },
    { parts:[{t:'fixed',v:'git commit -am '},{t:'var',v:'"message"'}], example:[{t:'fixed',v:'git commit -am '},{t:'var',v:'"fix: button alignment on login"'}], desc:"Stage tracked files & commit in one step" },
    { parts:[{t:'fixed',v:'git commit --amend'}], example:[{t:'fixed',v:'git commit --amend'}], desc:"Modify the very last commit" },
    { parts:[{t:'fixed',v:'git commit --amend --no-edit'}], example:[{t:'fixed',v:'git commit --amend --no-edit'}], desc:"Amend last commit without editing message" },

  { icon:"🌿", title:"Branching", commands:[
    { parts:[{t:'fixed',v:'git branch'}], example:[{t:'fixed',v:'git branch'}], desc:"List all local branches" },
    { parts:[{t:'fixed',v:'git branch -a'}], example:[{t:'fixed',v:'git branch -a'}], desc:"List local and remote branches" },
    { parts:[{t:'fixed',v:'git branch '},{t:'var',v:'<branch-name>'}], example:[{t:'fixed',v:'git branch '},{t:'var',v:'Task/login-page'}], desc:"Create a new branch (stays on current)" },
    { parts:[{t:'fixed',v:'git checkout '},{t:'var',v:'<branch>'}], example:[{t:'fixed',v:'git checkout '},{t:'var',v:'Task/login-page'}], desc:"Switch to an existing branch" },
    { parts:[{t:'fixed',v:'git checkout -b '},{t:'var',v:'<new-branch>'}], example:[{t:'fixed',v:'git checkout -b '},{t:'var',v:'Task/login-page'}], desc:"Create and immediately switch to new branch" },

    { parts:[{t:'fixed',v:'git branch -D '},{t:'var',v:'<branch>'}], example:[{t:'fixed',v:'git branch -D '},{t:'var',v:'Task/old-feature'}], desc:"Force-delete branch (even unmerged)", tag:"danger" },
    { parts:[{t:'fixed',v:'git branch -m '},{t:'var',v:'<old>'},{t:'fixed',v:' '},{t:'var',v:'<new>'}], example:[{t:'fixed',v:'git branch -m '},{t:'var',v:'task/login'},{t:'fixed',v:' '},{t:'var',v:'Task/login-page'}], desc:"Rename a branch" },
  ]},
  { icon:"🔀", title:"Merging & Rebasing", commands:[
    { parts:[{t:'fixed',v:'git checkout '},{t:'var',v:'main'}], example:[{t:'fixed',v:'git checkout '},{t:'var',v:'main'}], desc:"Step 1 — Switch to the target branch first" },
    { parts:[{t:'fixed',v:'git merge '},{t:'var',v:'<branch-to-merge>'}], example:[{t:'fixed',v:'git merge '},{t:'var',v:'Task/login-page'}], desc:"Step 2 — Merge your feature branch into it" },
    { parts:[{t:'fixed',v:'git merge --no-ff '},{t:'var',v:'<branch>'}], example:[{t:'fixed',v:'git merge --no-ff '},{t:'var',v:'Task/login-page'}], desc:"Merge and always create a merge commit" },

  ]},
  { icon:"📜", title:"Log & History", commands:[

function partsToText(parts) { return parts.map(p=>p.v).join(''); }

function renderParts(parts) {
  return parts.map(p =>
    p.t === 'var'
      ? `<span class="cmd-var">${p.v}</span>`
      : `<span class="cmd-fixed">${p.v}</span>`
  ).join('');
}

function renderExample(parts) {
  return parts.map(p =>
    p.t === 'var'
      ? `<span class="ex-var">${p.v}</span>`
      : `<span class="ex-fixed">${p.v}</span>`
  ).join('');
}

    const card = document.createElement('div');
    card.className = 'category-card';
    const header = `<div class="card-header"><span class="card-icon">${cat.icon}</span><span class="card-title">${cat.title}</span></div>`;
    const cmds = cat.commands.map(c => {
      const raw = partsToText(c.parts).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const tag = c.tag ? `<span class="tag tag-${c.tag}">${c.tag}</span>` : '';
      return `<div class="command-item" onclick="copyCmd('${raw}')">
        <div class="cmd-line">${renderParts(c.parts)}${tag}</div>
        <div class="cmd-example"><span class="eg-label">eg →</span>${renderExample(c.example)}</div>
        <div class="cmd-desc">// ${c.desc}</div>
      </div>`;
    }).join('');
    card.innerHTML = header + `<div class="command-list">${cmds}</div>`;
    grid.appendChild(card);
  });
}

function showTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn');
  document.getElementById(tab+'-section').classList.add('active');
  btn.className=`tab-btn active-${tab}`;
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(()=>{
    const t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1800);
  });
}

function filterCommands(q) {
  q=q.toLowerCase();
  document.querySelectorAll('.command-item').forEach(i=>{
    i.style.display=i.textContent.toLowerCase().includes(q)?'':'none';
  });
  document.querySelectorAll('.category-card').forEach(c=>{
    c.style.display=[...c.querySelectorAll('.command-item')].some(i=>i.style.display!=='none')?'':'none';
  });
}

buildGrid(gitData,'git-grid');
buildGrid(dockerData,'docker-grid');
</script>
